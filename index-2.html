// ─── Encode / Decode ───────────────────────────────────────────────────────────
function encodeForm(obj) {
  const json = JSON.stringify(obj);
  const bytes = new TextEncoder().encode(json);
  const binary = Array.from(bytes).map(b => String.fromCharCode(b)).join("");
  return btoa(binary);
}

// ─── Animated background ───────────────────────────────────────────────────────
function GridCanvas() {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf;
    const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    resize(); window.addEventListener("resize", resize);
    const pts = Array.from({length:20},()=>({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.0003,vy:(Math.random()-.5)*.0003,r:Math.random()*1.5+.5,a:Math.random()}));
    const draw = () => {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const W=canvas.width,H=canvas.height;
      ctx.strokeStyle="rgba(99,102,241,.05)"; ctx.lineWidth=1;
      for(let x=0;x<W;x+=48){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<H;y+=48){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      pts.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=1; if(p.x>1)p.x=0; if(p.y<0)p.y=1; if(p.y>1)p.y=0;
        ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(165,180,252,${p.a*.4})`; ctx.fill();
      });
      for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
        const dx=(pts[i].x-pts[j].x)*W,dy=(pts[i].y-pts[j].y)*H,d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){ctx.beginPath();ctx.moveTo(pts[i].x*W,pts[i].y*H);ctx.lineTo(pts[j].x*W,pts[j].y*H);ctx.strokeStyle=`rgba(99,102,241,${(1-d/120)*.1})`;ctx.lineWidth=1;ctx.stroke();}
      }
      raf=requestAnimationFrame(draw);
    };
    draw();
    return ()=>{cancelAnimationFrame(raf);window.removeEventListener("resize",resize);};
  },[]);
  return <canvas ref={ref} style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:0}}/>;
}

// ─── Send Modal — builds URL and shows WhatsApp button ─────────────────────────
function SendModal({ customer, categories, products, onClose, onSent }) {
  const [selected, setSelected] = useState(() => new Set(products.map(p=>p.id)));
  const [step, setStep] = useState(1); // 1=בחר מוצרים, 2=שלח
  const [orderId] = useState("ORD-" + Date.now().toString().slice(-5));

  const toggle = id => setSelected(s => { const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const toggleCat = (catId, items) => {
    const allOn = items.every(p=>selected.has(p.id));
    setSelected(s=>{ const n=new Set(s); items.forEach(p=>allOn?n.delete(p.id):n.add(p.id)); return n; });
  };

  const grouped = categories.map(c=>({...c,items:products.filter(p=>p.categoryId===c.id)})).filter(g=>g.items.length>0);
  const selCount = selected.size;

  const buildUrl = () => {
    const selProds = products.filter(p=>selected.has(p.id));
    const usedCatIds = new Set(selProds.map(p=>p.categoryId));
    const selCats = categories.filter(c=>usedCatIds.has(c.id));
    const fd = {
      o: orderId,
      b: BPHONE,
      cu: { n:customer.name, ct:customer.contact, p:customer.phone, c:customer.city },
      ca: selCats.map(c=>({i:c.id,n:c.name,ic:c.icon,cl:c.color})),
      pr: selProds.map(p=>({i:p.id,c:p.categoryId,n:p.name,s:p.sku,u:p.unit,pr:p.price}))
    };
    return FORM_BASE_URL + "#form=" + encodeForm(fd);
  };

  const url = step===2 ? buildUrl() : null;
  const waMsg = url ? `היי ${customer.contact} 👋\n\nהכנתי עבורך טופס הזמנה.\nלחץ על הקישור, הזן כמויות ושלח חזרה:\n\n${url}` : "";

  return (
    <Modal title={step===1 ? `שליחת טופס — ${customer.name}` : "שלח ללקוח"} onClose={onClose} wide={step===1}>
      {step===1 && (
        <>
          <div style={{fontSize:13,color:"#64748b",marginBottom:18}}>בחר את המוצרים שיופיעו בטופס של הלקוח ({selCount} נבחרו)</div>
          {grouped.map(cat=>{
            const allOn=cat.items.every(p=>selected.has(p.id));
            return (
              <div key={cat.id} style={{marginBottom:12,border:"1px solid rgba(255,255,255,.07)",borderRadius:12,overflow:"hidden"}}>
                <div style={{padding:"10px 14px",background:"rgba(99,102,241,.08)",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>toggleCat(cat.id,cat.items)}>
                  <input type="checkbox" checked={allOn} onChange={()=>{}} style={{width:16,height:16,accentColor:"#6366f1"}}/>
                  <span style={{fontSize:18}}>{cat.icon}</span>
                  <span style={{fontWeight:700,fontSize:14}}>{cat.name}</span>
                  <NeonBadge color={cat.color} style={{marginRight:"auto"}}>{cat.items.filter(p=>selected.has(p.id)).length}/{cat.items.length}</NeonBadge>
                </div>
                <div style={{padding:"4px 0"}}>
                  {cat.items.map(p=>(
                    <div key={p.id} onClick={()=>toggle(p.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 14px",cursor:"pointer",transition:"background .15s",background:selected.has(p.id)?"rgba(99,102,241,.05)":"transparent"}}
                      onMouseEnter={e=>e.currentTarget.style.background="rgba(99,102,241,.08)"}
                      onMouseLeave={e=>e.currentTarget.style.background=selected.has(p.id)?"rgba(99,102,241,.05)":"transparent"}>
                      <input type="checkbox" checked={selected.has(p.id)} onChange={()=>{}} style={{width:15,height:15,accentColor:"#6366f1"}}/>
                      <span style={{flex:1,fontSize:13,fontWeight:600}}>{p.name}</span>
                      <span style={{fontSize:12,color:"#475569"}}>{p.sku}</span>
                      <span style={{fontSize:12,color:"#64748b"}}>{p.unit}</span>
                      <span style={{fontSize:13,color:"#34d399",fontWeight:700}}>₪{Number(p.price).toFixed(2)}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
          <div style={{display:"flex",gap:10,marginTop:20}}>
            <Btn v="primary" onClick={()=>{if(selCount>0)setStep(2);}} style={{flex:2,padding:13}} disabled={selCount===0}>
              המשך → ({selCount} מוצרים)
            </Btn>
            <Btn v="ghost" onClick={onClose} style={{flex:1,padding:13}}>ביטול</Btn>
          </div>
        </>
      )}

      {step===2 && (
        <>
          <div style={{textAlign:"center",marginBottom:24}}>
            <div style={{width:68,height:68,background:"linear-gradient(135deg,#25D366,#128C7E)",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,margin:"0 auto 14px",boxShadow:"0 8px 30px rgba(37,211,102,.3)"}}>📲</div>
            <div style={{fontSize:16,fontWeight:800,color:"#F8FAFC",marginBottom:4}}>{customer.name}</div>
            <div style={{fontSize:13,color:"#64748b"}}>{orderId} · {selCount} מוצרים</div>
          </div>

          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:"#6366f1",marginBottom:8,textTransform:"uppercase"}}>▸ הודעה ללקוח</div>
            <div style={{background:"rgba(0,0,0,.3)",border:"1px solid rgba(255,255,255,.07)",borderRadius:10,padding:12,fontSize:13,color:"#94a3b8",whiteSpace:"pre-wrap",lineHeight:1.7,marginBottom:8}}>{waMsg}</div>
            <Btn v="ghost" onClick={()=>navigator.clipboard.writeText(waMsg)} style={{width:"100%",padding:10,fontSize:13}}>📋 העתק הודעה</Btn>
          </div>

          <Btn v="wa" onClick={()=>{
            window.open(`https://wa.me/${customer.phone.replace(/^0/,"972")}?text=${encodeURIComponent(waMsg)}`,"_blank");
            onSent(orderId, customer.name, url);
            onClose();
          }} style={{width:"100%",padding:16,fontSize:15,marginBottom:10}}>
            💬 פתח WhatsApp ושלח
          </Btn>

          <Btn v="ghost" onClick={()=>setStep(1)} style={{width:"100%",padding:10,fontSize:13}}>← חזור לבחירת מוצרים</Btn>
        </>
      )}
    </Modal>
  );
}

                        <div style={{fontWeight:800,fontSize:16,color:"#F8FAFC",marginBottom:4}}>{c.name}</div>
                        <div style={{fontSize:13,color:"#64748b"}}>{c.contact}</div>

                    </div>
                    <div style={{fontSize:13,color:"#475569",marginBottom:16}}>📞 {c.phone}</div>
                    <div style={{display:"flex",gap:8}}>
                      <Btn v="wa" onClick={()=>setSendModal(c)} style={{flex:2,padding:"10px 14px",fontSize:13}}>📲 שלח טופס הזמנה</Btn>
                      <Btn v="ghost" onClick={()=>setCustModal(c)} style={{flex:1,padding:"10px",fontSize:12}}>✏️</Btn>
                      <Btn v="danger" onClick={()=>setCustomers(p=>p.filter(x=>x.id!==c.id))} style={{flex:1,padding:"10px",fontSize:12}}>🗑️</Btn>
                    </div>
                  </GlassCard>
                ))}
              </div>
            </div>
          )}

          {/* ── TAB: Products ── */}
          {tab==="products" && (
            <div style={{animation:"fadeUp .35s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                <div>
                  <div style={{fontSize:22,fontWeight:900,color:"#F8FAFC"}}>קטלוג מוצרים</div>
                  <div style={{fontSize:13,color:"#334155",marginTop:3}}>{categories.length} מחלקות · {products.length} מוצרים</div>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <Btn v="ghost" onClick={()=>setCatModal({name:"",icon:"📦",color:"#6366F1"})}>+ מחלקה</Btn>
                  <Btn v="primary" onClick={()=>setProdModal({name:"",sku:"",categoryId:categories[0]?.id||"",unit:"",price:""})}>+ מוצר</Btn>
                </div>
              </div>
              {pbc.map((cat,ci)=>(
                <GlassCard key={cat.id} style={{marginBottom:14,overflow:"hidden",animation:`fadeUp .35s ${ci*.06}s both`}}>
                  <div style={{padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid rgba(99,102,241,.1)",background:`linear-gradient(90deg,${cat.color}10,transparent)`}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:36,height:36,background:`${cat.color}20`,border:`1px solid ${cat.color}40`,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{cat.icon}</div>
                      <div>
                        <div style={{fontWeight:800,fontSize:15,color:"#F8FAFC"}}>{cat.name}</div>
                        <NeonBadge color={cat.color}>{cat.items.length} מוצרים</NeonBadge>

                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <Btn v="ghost" onClick={()=>setCatModal(cat)} style={{padding:"6px 12px",fontSize:12}}>✏️ ערוך</Btn>
                      <Btn v="danger" onClick={()=>{setCategories(p=>p.filter(c=>c.id!==cat.id));setProducts(p=>p.filter(pr=>pr.categoryId!==cat.id));}} style={{padding:"6px 12px",fontSize:12}}>🗑️</Btn>
                    </div>
                  </div>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead>
                      <tr>{["מוצר","מק\"ט","יחידה","מחיר",""].map((h,i)=><th key={i} style={{padding:"9px 14px",textAlign:"right",fontSize:11,color:"#475569",fontWeight:600,letterSpacing:.5,textTransform:"uppercase",background:"rgba(0,0,0,.2)"}}>{h}</th>)}</tr>
                    </thead>
                    <tbody>
                      {cat.items.map(p=>(
                        <tr key={p.id} className="row-tr">
                          <td style={{padding:"10px 14px",fontWeight:600,color:"#F8FAFC"}}>{p.name}</td>
                          <td style={{padding:"10px 14px",color:"#475569",fontSize:12}}>{p.sku}</td>
                          <td style={{padding:"10px 14px",color:"#94a3b8"}}>{p.unit}</td>
                          <td style={{padding:"10px 14px",color:"#34d399",fontWeight:700}}>₪{Number(p.price).toFixed(2)}</td>
                          <td style={{padding:"10px 14px",textAlign:"left"}}>
                            <div style={{display:"flex",gap:6",justifyContent:"flex-end"}}>
                              <Btn v="ghost" onClick={()=>setProdModal(p)} style={{padding:"5px 10px",fontSize:11}}>✏️</Btn>
                              <Btn v="danger" onClick={()=>setProducts(pr=>pr.filter(x=>x.id!==p.id))} style={{padding:"5px 10px",fontSize:11}}>🗑️</Btn>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  <div style={{padding:"10px 14px",borderTop:"1px solid rgba(255,255,255,.04)"}}>
                    <Btn v="ghost" onClick={()=>setProdModal({name:"",sku:"",categoryId:cat.id,unit:"",price:""})} style={{padding:"6px 14px",fontSize:12}}>+ הוסף מוצר</Btn>
                  </div>
                </GlassCard>
              ))}
            </div>
          )}

          {/* ── TAB: Orders ── */}
          {tab==="orders" && (
            <div style={{animation:"fadeUp .35s"}}>
              <div style={{fontSize:22,fontWeight:900,color:"#F8FAFC",marginBottom:20}}>הזמנות שנשלחו</div>
              {orders.length===0
                ? <GlassCard style={{padding:40,textAlign:"center",color:"#334155"}}>עדיין לא נשלחו הזמנות</GlassCard>
                : orders.slice().reverse().map((o,i)=>(
                  <GlassCard key={o.id} style={{padding:"16px 20px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center",animation:`fadeUp .3s ${i*.05}s both`}}>
                    <div>
                      <div style={{fontWeight:700,color:"#F8FAFC",marginBottom:3}}>{o.customerName}</div>
                      <div style={{fontSize:12,color:"#475569"}}>{o.id} · {o.sentAt}</div>
                    </div>
                    <NeonBadge color="#34D399">נשלח</NeonBadge>
                  </GlassCard>
                ))
              }
            </div>
          )}

          {/* ── TAB: Settings ── */}
          {tab==="settings" && (
            <div style={{animation:"fadeUp .35s",maxWidth:500}}>
              <div style={{fontSize:22,fontWeight:900,color:"#F8FAFC",marginBottom:20}}>הגדרות</div>
              <GlassCard style={{padding:24}}>
                <Fld label="מספר WhatsApp לקבלת הזמנות">
                  <TxtIn value={BPHONE} readOnly placeholder="972522773086"/>
                  <div style={{fontSize:11,color:"#475569",marginTop:6}}>מספר זה קבוע בקוד. לשינוי — עדכן את BPHONE בקוד המקור.</div>
                </Fld>
              </GlassCard>
            </div>
          )}
        </div>
      </div>

      {/* ── Modals ── */}
      {catModal && (
        <Modal title={catModal.id?"עריכת מחלקה":"מחלקה חדשה"} onClose={()=>setCatModal(null)}>
          <Fld label="שם מחלקה"><TxtIn value={catModal.name} onChange={e=>setCatModal(p=>({...p,name:e.target.value}))} placeholder="שם המחלקה"/></Fld>
          <Fld label="אייקון"><TxtIn value={catModal.icon} onChange={e=>setCatModal(p=>({...p,icon:e.target.value}))} placeholder="📦"/></Fld>
          <Fld label="צבע">
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {["#6366F1","#34D399","#F59E0B","#A78BFA","#EC4899","#06B6D4","#EF4444","#14B8A6"].map(cl=>(
                <div key={cl} onClick={()=>setCatModal(p=>({...p,color:cl}))} style={{width:28,height:28,borderRadius:8,background:cl,cursor:"pointer",border:catModal.color===cl?"3px solid white":"2px solid transparent",transition:"all .15s"}}/>
              ))}
            </div>
          </Fld>
          <div style={{display:"flex",gap:10,marginTop:20}}>
            <Btn v="primary" onClick={()=>saveCat(catModal)} style={{flex:1,padding:12}}>שמור</Btn>

      {prodModal && (

          <Fld label="מק\"ט"><TxtIn value={prodModal.sku} onChange={e=>setProdModal(p=>({...p,sku:e.target.value}))} placeholder="ABC-001"/></Fld>
          <Fld label="מחלקה">
            <select value={prodModal.categoryId} onChange={e=>setProdModal(p=>({...p,categoryId:e.target.value}))}

              {categories.map(c=><option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
            </select>
          </Fld>
          <Fld label="יחידת מידה"><TxtIn value={prodModal.unit} onChange={e=>setProdModal(p=>({...p,unit:e.target.value}))} placeholder='ק"ג / ליטר / יחידה'/></Fld>
          <Fld label="מחיר ₪"><TxtIn type="number" value={prodModal.price} onChange={e=>setProdModal(p=>({...p,price:e.target.value}))} placeholder="0.00"/></Fld>
          <div style={{display:"flex",gap:10,marginTop:20}}>
            <Btn v="primary" onClick={()=>saveProd(prodModal)} style={{flex:1,padding:12}}>שמור</Btn>

      {custModal && (

          <Fld label="איש קשר"><TxtIn value={custModal.contact} onChange={e=>setCustModal(p=>({...p,contact:e.target.value}))} placeholder="שם + תפקיד"/></Fld>
          <Fld label="מספר WhatsApp"><TxtIn value={custModal.phone} onChange={e=>setCustModal(p=>({...p,phone:e.target.value}))} placeholder="0521234567"/></Fld>
          <Fld label="עיר"><TxtIn value={custModal.city} onChange={e=>setCustModal(p=>({...p,city:e.target.value}))} placeholder="תל אביב"/></Fld>

}

// ─── Customer Form ─────────────────────────────────────────────────────────────
function CustomerForm({ data }) {
  const { o:orderId, b:bizPhone, cu:cust, ca:cats, pr:prods } = data;
  const categories = cats.map(c=>({id:c.i,name:c.n,icon:c.ic,color:c.cl}));
  const products   = prods.map(p=>({id:p.i,categoryId:p.c,name:p.n,sku:p.s,unit:p.u,price:p.pr}));
  const grouped    = categories.map(c=>({...c,items:products.filter(p=>p.categoryId===c.id)})).filter(g=>g.items.length>0);

  const [qtys,  setQtys]  = useState({});
  const [notes, setNotes] = useState({});
  const [gNote, setGNote] = useState("");
  const [warn,  setWarn]  = useState(false);
  const [sent,  setSent]  = useState(false);

  const summary = products.map(p=>{ const q=parseFloat(qtys[p.id])||0; if(!q)return null; return {name:p.name,unit:p.unit,q,note:notes[p.id]||"",lt:q*parseFloat(p.price)}; }).filter(Boolean);
  const total   = summary.reduce((s,i)=>s+i.lt,0);

  const sendOrder = () => {
    if(!summary.length){setWarn(true);return;}
    setWarn(false);
    const lines = summary.map(i=>`• ${i.name}: ${i.q} ${i.unit}${i.note?` (${i.note})`:""} – ₪${i.lt.toFixed(2)}`);
    const msg = `📋 *הזמנה חדשה #${orderId}*\n🏢 ${cust.n}\n📅 ${new Date().toLocaleDateString("he-IL")}\n\n*פירוט:*\n${lines.join("\n")}\n\n*💰 סה"כ: ₪${total.toFixed(2)}*${gNote?`\n\n📝 הערות: ${gNote}`:""}`;
    window.open(`https://wa.me/${bizPhone}?text=${encodeURIComponent(msg)}`,"_blank");
    setSent(true);
  };

  return (
    <div style={{direction:"rtl",fontFamily:"'Heebo',sans-serif",background:"#020817",minHeight:"100vh",color:"#E2E8F0"}}>
      <style>{`
        .qi{width:72px;padding:7px 10px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.25);border-radius:8px;color:#e2e8f0;text-align:center;font-size:15px;font-family:'Heebo',sans-serif;transition:all .2s;outline:none}
        .qi:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
        .qi.v{border-color:#34d399;background:rgba(52,211,153,.08);color:#34d399;font-weight:700}
        .ni{width:100%;padding:6px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;color:#94a3b8;font-size:12px;font-family:'Heebo',sans-serif;outline:none}
        .ni:focus{border-color:#6366f1}
        @media(max-width:600px){table{font-size:12px}td,th{padding:6px 8px!important}.qi{width:56px}}
      `}</style>
      <div style={{position:"fixed",inset:0,backgroundImage:"linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px)",backgroundSize:"40px 40px",pointerEvents:"none"}}/>
      <div style={{position:"fixed",top:-200,left:"50%",transform:"translateX(-50%)",width:600,height:400,background:"radial-gradient(ellipse,rgba(99,102,241,.15) 0%,transparent 70%)",pointerEvents:"none"}}/>

      <div style={{position:"relative",zIndex:1}}>
        <div style={{padding:"40px 24px 28px",textAlign:"center",borderBottom:"1px solid rgba(99,102,241,.2)"}}>
          <div style={{fontSize:11,letterSpacing:4,color:"#6366f1",textTransform:"uppercase",marginBottom:10,opacity:.8}}>● Order Form</div>
          <h1 style={{fontSize:26,fontWeight:900,background:"linear-gradient(135deg,#fff,#a5b4fc)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:6}}>טופס הזמנה</h1>
          <p style={{fontSize:14,color:"#64748b"}}>שלום {cust.ct}, אנא מלא כמויות ושלח</p>
        </div>

        <div style={{display:"flex",gap:12,padding:"16px 24px",flexWrap:"wrap",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
          {[["לקוח",cust.n],["הזמנה",orderId],["תאריך",new Date().toLocaleDateString("he-IL")]].map(([k,v])=>(
            <div key={k} style={{background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.2)",borderRadius:8,padding:"7px 13px",fontSize:13}}>
              <span style={{color:"#6366f1",fontWeight:700,marginLeft:6}}>{k}</span>{v}
            </div>
          ))}
        </div>

        {grouped.map(cat=>(
          <div key={cat.id} style={{margin:"16px 24px",borderRadius:14,overflow:"hidden",border:"1px solid rgba(255,255,255,.07)"}}>
            <div style={{padding:"12px 16px",background:`linear-gradient(90deg,${cat.color}15,rgba(99,102,241,.08))`,borderBottom:"1px solid rgba(99,102,241,.12)",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:18}}>{cat.icon}</span>{cat.name}
            </div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr>{["מוצר","מק\"ט","יחידה","מחיר","כמות","הערה"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"right",fontSize:11,color:"#475569",fontWeight:600,background:"rgba(0,0,0,.2)"}}>{h}</th>)}</tr>
              </thead>
              <tbody>
                {cat.items.map(p=>(
                  <tr key={p.id} style={{borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                    <td style={{padding:"10px 12px",fontWeight:600,color:"#e2e8f0"}}>{p.name}</td>
                    <td style={{padding:"10px 12px",color:"#475569",fontSize:12}}>{p.sku}</td>
                    <td style={{padding:"10px 12px",color:"#94a3b8"}}>{p.unit}</td>
                    <td style={{padding:"10px 12px",color:"#34d399",fontWeight:700}}>₪{Number(p.price).toFixed(2)}</td>
                    <td style={{padding:"10px 12px"}}>
                      <input type="number" min="0" placeholder="0" className={`qi${(parseFloat(qtys[p.id])||0)>0?" v":""}`}
                        value={qtys[p.id]||""} onChange={e=>setQtys(q=>({...q,[p.id]:e.target.value}))}/>
                    </td>
                    <td style={{padding:"10px 12px"}}>
                      <input type="text" placeholder="הערה..." className="ni"
                        value={notes[p.id]||""} onChange={e=>setNotes(n=>({...n,[p.id]:e.target.value}))}/>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ))}

        <div style={{margin:"16px 24px",background:"rgba(52,211,153,.05)",border:"1px solid rgba(52,211,153,.15)",borderRadius:14,padding:18}}>
          <div style={{fontSize:12,fontWeight:700,color:"#34d399",letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>▸ סיכום</div>
          {summary.length===0
            ? <div style={{fontSize:13,color:"#334155"}}>טרם נבחרו פריטים...</div>
            : summary.map((item,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
                <span style={{fontSize:13}}>{item.name} × {item.q} {item.unit}{item.note?` (${item.note})`:""}</span>
                <span style={{color:"#34d399",fontWeight:700,fontSize:13}}>₪{item.lt.toFixed(2)}</span>
              </div>
            ))
          }
          <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid rgba(52,211,153,.2)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:14,color:"#94a3b8"}}>סה"כ</span>
            <span style={{fontSize:22,fontWeight:900,color:"#34d399"}}>₪{total.toFixed(2)}</span>
          </div>
        </div>

        <div style={{margin:"0 24px 16px",background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.07)",borderRadius:14,padding:18}}>
          <label style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"#6366f1",display:"block",marginBottom:8}}>▸ הערות</label>
          <textarea value={gNote} onChange={e=>setGNote(e.target.value)} placeholder="הערות, בקשות מיוחדות..."
            style={{width:"100%",padding:10,background:"rgba(0,0,0,.3)",border:"1px solid rgba(255,255,255,.08)",borderRadius:8,color:"#e2e8f0",fontSize:14,fontFamily:"'Heebo',sans-serif",resize:"vertical",minHeight:72,outline:"none",direction:"rtl"}}/>
        </div>

        {warn && <div style={{color:"#f59e0b",textAlign:"center",fontSize:13,marginBottom:10}}>⚠️ יש לבחור לפחות פריט אחד</div>}

        {sent
          ? <div style={{margin:"0 24px 40px",padding:18,background:"rgba(52,211,153,.1)",border:"1px solid rgba(52,211,153,.3)",borderRadius:14,textAlign:"center",fontSize:16,fontWeight:700,color:"#34d399"}}>✅ ההזמנה נשלחה בהצלחה!</div>
          : <button onClick={sendOrder} style={{display:"block",width:"calc(100% - 48px)",margin:"0 24px 40px",padding:18,background:"linear-gradient(135deg,#25D366,#128C7E)",color:"white",border:"none",borderRadius:14,fontSize:16,fontWeight:900,fontFamily:"'Heebo',sans-serif",cursor:"pointer",boxShadow:"0 8px 30px rgba(37,211,102,.3)"}}>
              📲 שלח הזמנה ב-WhatsApp
            </button>
        }
      </div>
    </div>
  );
}

// ─── Bootstrap ─────────────────────────────────────────────────────────────────
let __fd = null, __fe = null;
(function(){
  const h = window.location.hash;
  if (!h.startsWith("#form=")) return;
  try {
    const enc = h.slice(6).replace(/%3D/gi,"=").replace(/%2B/gi,"+").replace(/%2F/gi,"/");
    const bin = atob(enc);
    const bytes = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    __fd = JSON.parse(new TextDecoder("utf-8").decode(bytes));
  } catch(e) { __fe = e.message; }
})();

function Root() {
  if (__fd) return React.createElement(CustomerForm, {data:__fd});
  if (__fe) return React.createElement('div',{style:{color:"#ef4444",padding:40,fontFamily:"'Heebo',sans-serif",direction:"rtl",fontSize:15,lineHeight:1.8}},`שגיאה בטעינת הטופס:\n${__fe}`);
  return React.createElement(App);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Root));
</script>
